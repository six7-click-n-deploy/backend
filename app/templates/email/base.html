{# Inline-style base layout for transactional emails.

   Email clients ignore <style> tags in <head> in many cases (Gmail
   strips them sometimes too) and they don't fetch external stylesheets.
   So we keep the layout dead simple, lean on tables for compatibility
   with Outlook, and inline a small set of utility classes via a
   <style> block that *is* honoured by major modern clients (Gmail web,
   Apple Mail, iOS Mail). When it isn't honoured, the content stays
   readable — just less pretty. #}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Click-n-Deploy{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1f2937;
      line-height: 1.5;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 16px;
      color: #111827;
    }
    h2 {
      font-size: 18px;
      margin: 28px 0 12px;
      color: #111827;
    }
    h3 {
      font-size: 14px;
      margin: 16px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6b7280;
    }
    p { margin: 0 0 12px; }
    a { color: #2563eb; text-decoration: underline; }
    code {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 13px;
      color: #111827;
    }
    table.card,
    table.list {
      width: 100%;
      margin: 12px 0 16px;
      border-collapse: collapse;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    table.card th,
    table.list th {
      background: #f9fafb;
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }
    table.card td,
    table.list td {
      padding: 10px 14px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: top;
      font-size: 14px;
    }
    table.card tr:last-child td,
    table.list tr:last-child td { border-bottom: 0; }
    table.card td:first-child {
      width: 140px;
      color: #6b7280;
    }
    .button {
      display: inline-block;
      padding: 10px 18px;
      background: #2563eb;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .muted {
      font-size: 12px;
      color: #6b7280;
      margin-top: 24px;
    }
    .footer {
      max-width: 640px;
      margin: 16px auto 0;
      padding: 0 8px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    Sent automatically by Click-n-Deploy. Do not reply.
  </div>
</body>
</html>
