version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: api
    env_file:
      - ../.env
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload



  db:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: