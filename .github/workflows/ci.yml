name: Backend CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ================================================================
  # 🔍 LINT
  # ================================================================
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev --no-root

      - name: Run Ruff
        run: poetry run ruff check .

  # ================================================================
  # 🧪 TEST (unit) — no external dependencies
  # ================================================================
  test-unit:
    name: "🧪 Test (unit)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev --no-root

      - name: Run unit tests
        run: poetry run pytest -m unit -v
        env:
          # ``DATABASE_URL`` muss gesetzt sein, weil ``app.config.Settings``
          # es als Pflichtfeld deklariert — ohne wäre der App-Import in
          # den Tests schon ein ValidationError. Ein separates
          # ``TEST_DATABASE_URL`` brauchen wir hier nicht: der Conftest
          # fällt auf ``settings.DATABASE_URL`` zurück, und auf dem
          # Runner-VM gibt es ohnehin nur diese eine DB. Lokal ist die
          # Trennung wichtig (Dev-DB vs. Wegwerf-Test-DB); in CI nicht.
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          # Lifespan-startup spawns a Celery event-listener + a
          # reconciler asyncio task on every ``TestClient(app)``
          # construct. Across hundreds of test-client contexts those
          # daemons stack up, hold DB + broker connections, and
          # eventually exhaust the SQLAlchemy pool / block on broker
          # reads. This flag short-circuits the lifespan body in
          # tests — production paths set neither var.
          DISABLE_BACKGROUND_TASKS: "1"
          CREDENTIAL_ENCRYPTION_KEY: "Q1PNlFd4It9oQPtjCcXcmB7wGDkY4w8KwpIRNSF4u7U="
          KEYCLOAK_SERVER_URL: "http://localhost:8080"
          KEYCLOAK_REALM: "dhbw"
          KEYCLOAK_CLIENT_ID: "appstore-backend"
          KEYCLOAK_CLIENT_SECRET: "test-secret"
          KEYCLOAK_ENABLED: "false"
          # Suffix the .coverage file so it can be merged in the
          # ``coverage`` job alongside the integration job data.
          COVERAGE_FILE: .coverage.unit

      - name: Upload coverage data (unit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-unit
          path: .coverage.unit
          include-hidden-files: true
          retention-days: 1

  # ================================================================
  # 🧪 TEST (integration) — requires Postgres
  # ================================================================
  # Covers every test in ``tests/`` that is NOT marked ``unit``. The
  # old separate ``api`` lane was retired together with the marker —
  # the integration suite now exercises the FastAPI app end-to-end
  # via ``TestClient`` (see ``tests/test_*_api.py``), and there is
  # no longer a meaningful unit/api split below the integration
  # bar.
  test-integration:
    name: "🧪 Test (integration)"
    runs-on: ubuntu-latest
    needs: [test-unit]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev --no-root

      - name: Run integration tests
        # ``|| [ $? -eq 5 ]`` swallows pytest's "no tests collected"
        # exit code (5). With the api marker retired and integration
        # being our broadest lane this should never trip, but the
        # guard stays as cheap insurance against a future re-mark.
        run: poetry run pytest -m integration -v || [ $? -eq 5 ]
        env:
          # Nur ``DATABASE_URL`` — die Tests fallen über den
          # Conftest-Fallback automatisch darauf zurück, und es gibt
          # auf dem Runner sowieso nur diese eine DB. Pflichtfeld in
          # ``Settings``; ohne wäre der App-Import schon ein
          # ValidationError.
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          # Required — see test-unit job for the full rationale.
          # Without this, the FastAPI lifespan spawns a Celery
          # listener thread on every TestClient(app) enter, stacks
          # up over hundreds of tests, and either hangs the runner
          # or OOM-kills it.
          DISABLE_BACKGROUND_TASKS: "1"
          CREDENTIAL_ENCRYPTION_KEY: "Q1PNlFd4It9oQPtjCcXcmB7wGDkY4w8KwpIRNSF4u7U="
          KEYCLOAK_SERVER_URL: "http://localhost:8080"
          KEYCLOAK_REALM: "dhbw"
          KEYCLOAK_CLIENT_ID: "appstore-backend"
          KEYCLOAK_CLIENT_SECRET: "test-secret"
          KEYCLOAK_ENABLED: "false"
          COVERAGE_FILE: .coverage.integration

      - name: Upload coverage data (integration)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-integration
          path: .coverage.integration
          include-hidden-files: true
          retention-days: 1

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7

  # ================================================================
  # 📊 COVERAGE — aggregate + publish to GitHub Pages
  # ================================================================
  # Combines the .coverage data from the unit and integration jobs,
  # renders an HTML report, emits a Shields.io endpoint badge.json,
  # and (only on main) deploys everything to GitHub Pages.
  #
  # The Pages source for this repo must be set to "GitHub Actions"
  # under Settings → Pages once. Until then, the deploy step fails
  # but the artifact is still uploaded.
  coverage:
    name: "📊 Coverage"
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev --no-root

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data
        run: poetry run coverage combine

      - name: Render HTML report
        run: poetry run coverage html -d coverage-html

      - name: Render JSON report
        run: poetry run coverage json -o coverage-html/coverage.json

      - name: Generate Shields.io endpoint badge
        run: |
          PCT=$(python -c "import json; print(round(json.load(open('coverage-html/coverage.json'))['totals']['percent_covered'], 1))")
          COLOR=$(python -c "p=$PCT; print('brightgreen' if p>=80 else 'green' if p>=70 else 'yellow' if p>=50 else 'orange' if p>=30 else 'red')")
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > coverage-html/badge.json
          echo "Coverage: ${PCT}% (${COLOR})"

      - name: Upload HTML report as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 14

      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage-html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4

  # ================================================================
  # 🔒 SECURITY (deps + filesystem) — blocks on HIGH/CRITICAL
  # ================================================================
  # Runs in parallel with lint/test-unit. Findings appear in the
  # GitHub Security tab via SARIF upload. Whitelist false positives
  # in `.trivyignore` (with a comment explaining why).
  security:
    name: "🔒 Security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-root

      - name: pip-audit (production deps, HIGH+)
        run: |
          poetry run python -m pip install --upgrade pip
          poetry run python -m pip install pip-audit
          # PYSEC-2026-1325 (ecdsa): Minerva timing side-channel on
          # P-256. No upstream fix — python-ecdsa considers side-channel
          # attacks out of scope, so this will never be resolved. It's
          # pulled in transitively by python-jose. The vuln only affects
          # *signing* (sign_digest); our only use of jose is verifying
          # Keycloak RS256 tokens (app/utils/keycloak_auth.py), so the
          # attack surface is not present. Ignored here rather than left
          # to fail --strict indefinitely. Revisit if we ever sign with
          # ecdsa or migrate off python-jose (e.g. to PyJWT).
          poetry run pip-audit --strict --ignore-vuln PYSEC-2026-1325

      # Trivy fs runs twice on purpose:
      #   1. blocking gate — fails the job on HIGH/CRITICAL
      #   2. SARIF emit — uploads ALL findings (incl. ignored ones)
      #      to the Security tab so they remain visible
      - name: Trivy filesystem scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Trivy filesystem scan (SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy fs results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ================================================================
  # 🐳 BUILD — always runs, proves Dockerfile works
  # ================================================================
  build:
    name: "🐳 Build"
    runs-on: ubuntu-latest
    needs: [lint, test-integration, security]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # 🔒 IMAGE SCAN — Trivy CVE scan against the built image
  # ================================================================
  # Builds a single-platform amd64 image with --load so the local
  # Docker daemon can hand it to Trivy. The build cache is shared
  # with the multi-platform `build` job (cache-from: type=gha) so
  # this is mostly a thin layer on top.
  image-scan:
    name: "🔒 Image Scan"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image (amd64, --load)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: backend:scan
          cache-from: type=gha

      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: backend:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: 1

      - name: Trivy image scan (SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: backend:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-image.sarif

      - name: Upload Trivy image results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ================================================================
  # 📦 PUSH — only on main
  # ================================================================
  push:
    name: "📦 Push"
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================================
  # 🚀 TRIGGER STAGING DEPLOY
  # ================================================================
  trigger-staging:
    name: "🚀 Trigger Staging Deploy"
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger staging deployment
        run: |
          gh workflow run staging.yml \
            --repo six7-click-n-deploy/deployment \
            --ref main
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENT_PAT }}
